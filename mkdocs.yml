# MkDocs configuration for the dbRIP wiki.
#
# To build and serve locally:
#   pip install mkdocs-material
#   mkdocs serve              <- live preview at http://localhost:8001
#   mkdocs build              <- generates static site in site/
#
# To deploy to GitHub Pages:
#   mkdocs gh-deploy

site_name: dbRIP Wiki
site_description: Wiki for the dbRIP API - retrotransposon insertion polymorphism database
repo_url: https://github.com/liang-lab/dbRIP

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
  features:
    - content.code.copy        # Copy button on code blocks
    - navigation.sections      # Collapsible sections in sidebar
    - navigation.top           # Back-to-top button
    - search.suggest           # Search autocomplete

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Data and Schema: data.md
  - Ingest Pipeline: ingest.md
  - API Reference: api-reference.md
  - Frontend: frontend.md
  - Track Hub: track-hub.md
  - CLI: cli.md
  - MCP: mcp.md
  - Maintenance: maintenance.md
  - Deployment: deployment.md
  - Concepts: concepts.md

markdown_extensions:
  - pymdownx.highlight:         # Syntax highlighting in code blocks
      anchor_linenums: true
  - pymdownx.superfences        # Fenced code blocks
  - admonition                  # Note/warning/tip callout boxes
  - pymdownx.details            # Collapsible sections
  - tables                      # Markdown tables
  - toc:
      permalink: true           # Anchor links on headings
